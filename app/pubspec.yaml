name: weekai
description: "Tu semana, más clara y más fácil."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

flutter_native_splash:
  color: "#5B7FFF"
  image: assets/icon.png
  android: true
  ios: true

  android_12:
    color: "#5B7FFF"
    image: assets/icon.png
